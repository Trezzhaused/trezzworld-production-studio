[phases.setup]
# inkscape/gimp/freecad/xvfb-run back LUMI's creative-tool capabilities
# (backend/lumi_creative_tools.py) — vector SVG rendering, raster image
# filters, and parametric CAD primitives.
nixPkgs = ["ffmpeg", "python312", "nodejs_20", "inkscape", "gimp", "freecad", "xvfb-run"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt", "npm ci"]

[phases.build]
# Explicit so the React frontend is always rebuilt on deploy — relying on
# Nixpacks' auto-detected build step left this ambiguous and a prior frontend
# change didn't show up on the live site.
cmds = ["npm run build:renderer"]
