name: Deploy to app.trezzhaus.com

# Triggers: push to main branch
on:
  push:
    branches:
      - main
  workflow_dispatch:   # lets you trigger manually from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the latest code ───────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 2. Install dependencies and validate the build ────────────────────
      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Start backend for smoke tests
        run: |
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > /tmp/trezzworld-backend.log 2>&1 &
          echo $! > /tmp/trezzworld-backend.pid

      - name: Run deployment smoke tests
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --location http://127.0.0.1:8000/api/health >/tmp/health.json 2>/dev/null; then
              break
            fi
            sleep 2
          done
          bash ./scripts/deploy-smoke-test.sh http://127.0.0.1:8000

      - name: Stop backend smoke test server
        if: always()
        run: |
          if [ -f /tmp/trezzworld-backend.pid ]; then
            kill $(cat /tmp/trezzworld-backend.pid) || true
          fi

      # ── 3. Install Railway CLI ─────────────────────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # ── 4. Validate Railway secrets before attempting deployment ──────────
      - name: Validate Railway secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not configured."
            echo "::error::Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: RAILWAY_TOKEN  Value: your Railway project token (railway.com → Project → Settings → Tokens)"
            exit 1
          fi
          TARGET_SERVICE="${RAILWAY_SERVICE_ID:-$RAILWAY_SERVICE}"
          if [ -z "$TARGET_SERVICE" ]; then
            echo "::error::RAILWAY_SERVICE or RAILWAY_SERVICE_ID secret is not configured."
            echo "::error::Add it at: Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::Name: RAILWAY_SERVICE (service name) or RAILWAY_SERVICE_ID (service id)"
            exit 1
          fi
          if printf '%s' "$TARGET_SERVICE" | grep -q '[[:cntrl:]]'; then
            echo "::error::RAILWAY service value contains unsupported control characters."
            exit 1
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::RAILWAY_PROJECT_ID secret is not configured."
            echo "::error::Without a project ID, the Railway CLI cannot locate your service and will fail with 'Service not found'."
            echo "::error::Find the value at: railway.com → Your Project → Settings → General → Project ID"
            echo "::error::Add it at: GitHub → Settings → Secrets and variables → Actions → New repository secret → Name: RAILWAY_PROJECT_ID"
            exit 1
          fi
          TARGET_ENVIRONMENT="${RAILWAY_ENVIRONMENT:-production}"
          if printf '%s' "$TARGET_ENVIRONMENT" | grep -q '[[:cntrl:]]'; then
            echo "::error::RAILWAY environment value contains unsupported control characters."
            exit 1
          fi
          echo "TARGET_SERVICE=$TARGET_SERVICE" >> "$GITHUB_ENV"
          echo "TARGET_ENVIRONMENT=$TARGET_ENVIRONMENT" >> "$GITHUB_ENV"

      # ── 5. Deploy to Railway (builds Dockerfile automatically) ────────────
      - name: Deploy via Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          DEPLOY_ARGS=(--service "$TARGET_SERVICE" --detach)
          DEPLOY_ARGS=(--environment "$TARGET_ENVIRONMENT" "${DEPLOY_ARGS[@]}")
          DEPLOY_ARGS=(--project "$RAILWAY_PROJECT_ID" "${DEPLOY_ARGS[@]}")
          railway up "${DEPLOY_ARGS[@]}"

      - name: Verify production health
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          TARGET_URL="${PRODUCTION_URL:-https://app.trezzhaus.com}"
          echo "Checking $TARGET_URL/api/health"
          curl --fail --silent --show-error --location --retry 8 --retry-delay 10 --retry-all-errors "$TARGET_URL/api/health"
          echo
          echo "Checking $TARGET_URL/api/config/status"
          curl --fail --silent --show-error --location --retry 8 --retry-delay 10 --retry-all-errors "$TARGET_URL/api/config/status"
          echo
          echo "Checking $TARGET_URL/api/ops/status"
          curl --fail --silent --show-error --location --retry 8 --retry-delay 10 --retry-all-errors "$TARGET_URL/api/ops/status"
